<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotivaQuiz - Round 2 Review</title>
    <link rel="stylesheet" href="round2review.css">
</head>
<body>
    <div class="header">
        <div class="logo">MOTIVAQUIZ</div>
        <div class="topic-title">INTRODUCTION TO COMPUTER HARDWARE</div>
        <div class="user-stats">Rank #<span id="userRank">1</span> - Points: <span id="userPoints">0</span></div>
    </div>

    <div class="review-container">
        <h1 class="review-title">Round 2 Review - Identification</h1>

        <table class="review-table">
            <thead>
                <tr>
                    <th>Questions</th>
                    <th>Your Answer</th>
                    <th>Your Result</th>
                    <th>Study Tip</th>
                </tr>
            </thead>
            <tbody id="reviewTableBody"></tbody>
        </table>

        <div class="action-buttons">
            <button class="action-btn dashboard-btn" onclick="goToDashboard()">Home</button>
            <button class="action-btn continue-btn" onclick="retakeRound()">Retake round</button>
            <button class="action-btn continue-btn" id="advanceBtn" onclick="continueToRound3()" style="display:none;">Advance to next round</button>
        </div>
    </div>

    <footer>
        ASIAN COLLEGE OF TECHNOLOGY - BULACAO CAMPUS
    </footer>

    <script src="round2review.js"></script>
</body>
</html>
