<!DOCTYPE html>
<html lang="en">

<style>

        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #00d4ff 0%, #00a8cc 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 64px;
            font-weight: bold;
            color: #4a00e0;
            text-shadow: 3px 3px 0px #fff, 6px 6px 0px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 48px;
            font-weight: bold;
            color: #7b2cbf;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .input-field {
            width: 400px;
            padding: 18px 24px;
            font-size: 18px;
            border: 3px solid #7b2cbf;
            border-radius: 15px;
            background-color: #e8e8e8;
            color: #7b2cbf;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field::placeholder {
            color: #7b2cbf;
            opacity: 0.8;
        }

        .input-field:focus {
            background-color: #fff;
            border-color: #4a00e0;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .login-button {
            width: 200px;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd93d 0%, #ffb700 100%);
            color: #000;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #ffe066 0%, #ffc933 100%);
        }

        .login-button:active {
            transform: translateY(-1px);
        }

        .signup-link {
            margin-top: 20px;
            font-size: 18px;
            color: #000;
        }

        .signup-link a {
            color: #000;
            font-weight: bold;
            text-decoration: underline;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #4a00e0;
        }
        footer {
            background-color: #0b2fa3;
            color: yellow;
            text-align: center;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
        }
    
</style>    
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotivaQuiz - ICT Learning Platform</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="main-content">
        <div class="container">
            <h1 class="logo">MOTIVAQUIZ</h1>
            <h2 class="subtitle">Welcome</h2>
            <p class="signup-link" style="text-align: center; margin: 30px 0;">
                Master ICT concepts through interactive quizzes and competitive gameplay
            </p>
            <div style="text-align: center;">
                <a href="login.html" class="login-button" style="margin-left: 20px;">LOG IN</a>
                <a href="Signup (1).html" class="login-button" style="margin-left: 20px;">SIGN UP</a>
            </div>
        </div>
    </div>
    <footer>ASIAN COLLEGE OF TECHNOLOGY – BULACAO CAMPUS</footer>
</body>
</html>
